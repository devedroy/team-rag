services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.13.1
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  tei:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.6
    platform: linux/amd64
    command: ["--model-id", "BAAI/bge-m3"]
    ports:
      - "8080:80"
    volumes:
      - tei_cache:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    restart: unless-stopped

  open-webui:
    image: ghcr.io/open-webui/open-webui:${OPENWEBUI_VERSION:-latest}
    ports:
      - "${OPENWEBUI_PORT:-3000}:8080"
    environment:
      OPENAI_API_BASE_URL: ${TEAMRAG_API_URL:-http://host.docker.internal:8000}/v1
      OPENAI_API_KEY: ${LLM_API_KEY}
      WEBUI_AUTH: "false"
    volumes:
      - open-webui:/app/backend/data
    restart: unless-stopped

volumes:
  postgres_data:
  qdrant_data:
  tei_cache:
  open-webui:
